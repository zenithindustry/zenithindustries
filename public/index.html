    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>zenithrubber</title>
    <!-- Add structured data for SEO -->
    <script type="application/ld+json">
      {
        "@context": "http://schema.org",
        "@type": "Organization",
        "name": "zenith",
        "url": "https://zenithindustry.github.io/zenithindustries",
        "logo": "https://zenithindustry.github.io/zenithindustries/logo192.png",
        "description": "Professional metal fabrication and manufacturing services.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "123 Metal Way",
          "addressLocality": "Toronto",
          "addressRegion": "ON",
          "postalCode": "M1M 1M1",
          "addressCountry": "CA"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+1-123-456-7890",
          "contactType": "customer service"
        }
      }
    </script>
    <!-- Script for GitHub Pages SPA routing -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
